name: full-stack-tests
channels:
  - conda-forge
dependencies:
  - python
  - setuptools
  - pip
  - numpy >=2.4
  - pydantic =2.11
  - pint >=0.25
  - openff-toolkit-base >=0.18
  - openff-fragmenter-base
  - openff-interchange-base >=0.5
  - openff-packmol =0.1=pyhc364b38_1
  - pymbar =4
  - pytest
  - pytest-randomly
  - pytest-xdist
  - requests
  - requests-mock
  - pyyaml
  - toml
  - bson
  - msgpack-python
  - openeye::openeye-toolkits >=2025
  - rdkit
  - intermol

    # Recharge
  - qcelemental
  - qcportal
  - qcengine
  - geometric

  - openff-qcsubmit >=0.57
  - qcarchivetesting
  - qcfractalcompute
  - h5py
  - psi4

  - openff-nagl

  - gromacs
  - lammps
