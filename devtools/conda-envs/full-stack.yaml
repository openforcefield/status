name: full-stack-tests
channels:
  - openeye
  - conda-forge
dependencies:
  - python
  - setuptools =81
  - pip
  - numpy >=2.4
  - pydantic =2.11.10
  - pint >=0.25
  - openff-toolkit >=0.18
  - ambertools =24.8  # just to help solver
  - openff-fragmenter
  - openff-interchange >=0.5.2
  - mdtraj
  - pymbar
  - pytest
  - pytest-randomly
  - pytest-xdist
  - requests
  - requests-mock
  - pyyaml
  - toml
  - bson
  - msgpack-python
  - openeye-toolkits >=2025
  - rdkit >=2025.09.5
  - intermol

    # Recharge
  - qcelemental
  - qcportal >=0.59
  - qcengine
  - geometric

  - openff-qcsubmit
  - qcarchivetesting
  - qcfractalcompute
  - h5py =3.16
  - psi4 =1.9.1

  - openff-nagl >=0.5
  - pytorch =2.8
  - pytorch-lightning =2.6.1

  - gromacs >=2024
  # https://github.com/conda-forge/lammps-feedstock/issues/207
  - lammps >=2024.08.29
  - openmpi =4

  - icu=75 # just to help solver
